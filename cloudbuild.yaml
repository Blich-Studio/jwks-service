steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    secretEnv: ['NPM_TOKEN']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg NPM_TOKEN="$$NPM_TOKEN" \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/blich-studio/jwks-service:$BUILD_ID \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/blich-studio/jwks-service:latest \
          -f Dockerfile \
          .

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/blich-studio/jwks-service:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/blich-studio/jwks-service:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'jwks-service'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/blich-studio/jwks-service:latest'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'JWT_ISSUER=${_JWT_ISSUER},JWT_AUDIENCE=${_JWT_AUDIENCE},JWT_KID=${_JWT_KID},JWT_EXPIRES_IN=15m,JWKS_CACHE_MAX_AGE=300'
      - '--set-secrets'
      - 'LOCAL_PRIVATE_KEY=auth-issuer-private-key-rsa:latest,TOKEN_API_KEY=jwks-token-api-key:latest'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '60'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/blich-studio/jwks-service:$BUILD_ID'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/blich-studio/jwks-service:latest'

substitutions:
  _REGION: europe-west1
  _JWT_ISSUER: https://jwks.blichstudio.com
  _JWT_AUDIENCE: blich-api
  _JWT_KID: prod-key-1

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NPM_TOKEN_CLOUDBUILD/versions/latest
      env: 'NPM_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
